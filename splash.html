<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Desktop Launcher</title>
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div class="splash-container">
    <div class="logo-container">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="orb"></div>
    </div>
    
    <h1>Hermes Agent</h1>
    <div class="subtitle">Autonomous Desktop Gateway</div>
    
    <div class="status-wrapper">
      <div class="status-text">
        <span id="status-message">Initializing...</span>
        <span id="status-pct" class="status-percentage">0%</span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
    
    <div id="console" class="console-container">
      <div class="log-line info">Starting desktop launcher services...</div>
    </div>
  </div>

  <script src="splash.js"></script>
</body>
</html>
